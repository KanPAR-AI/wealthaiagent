# frontend/cloudbuild.yaml
steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/aiagentapi/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_MANUAL_TAG:-${COMMIT_SHA:-latest}}'
      - '.'
    # If this cloudbuild.yaml is at the root of your repo, and Dockerfile is in frontend/:
    # dir: 'frontend'
    # If this cloudbuild.yaml is inside frontend/ (and Dockerfile is also in frontend/),
    # then 'dir' is not needed here as '.' will be the frontend/ directory.

  # 2. Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/aiagentapi/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_MANUAL_TAG:-${COMMIT_SHA:-latest}}'
    # dir: 'frontend' # Same comment as above

  # 3. Deploy the image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/aiagentapi/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_MANUAL_TAG:-${COMMIT_SHA:-latest}}'
      - '--region'
      - '${_REGION}'
      - '--project'
      - 'aiagentapi'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Add other flags like memory, cpu, min/max instances as needed
      # Example: '--memory=512Mi', '--cpu=1', '--min-instances=0', '--max-instances=2'

images:
  - '${_REGION}-docker.pkg.dev/aiagentapi/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_MANUAL_TAG:-${COMMIT_SHA:-latest}}'

substitutions:
  _REGION: 'us-central1'                 # Replace with your default region
  _ARTIFACT_REPO: 'frontend-docker-repo' # Replace with your Artifact Registry repo name
  _SERVICE_NAME: 'wealthaiagent-frontend'  # Replace with your Cloud Run service name
  _MANUAL_TAG: '' # For manual script to pass a tag. Defaults to empty.
  # COMMIT_SHA is a built-in variable from Cloud Build for triggered builds.
  # The expression ${_MANUAL_TAG:-${COMMIT_SHA:-latest}} means:
  # 1. If _MANUAL_TAG is provided (e.g., by deployprod.sh) and not empty, use its value.
  # 2. Else, if built-in COMMIT_SHA is available (from a trigger) and not empty, use its value.
  # 3. Else (e.g., manual local submit where _MANUAL_TAG is not given or is empty, and no trigger context), use 'latest'.

# Optional: Specify a service account for the build if needed, otherwise uses default Cloud Build SA
# serviceAccount: 'projects/YOUR_PROJECT_ID/serviceAccounts/your-custom-cloud-build-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com'

# Optional: Timeout for the build
# timeout: '1200s'