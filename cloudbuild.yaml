# frontend/cloudbuild.yaml
steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'YOUR_REGION-docker.pkg.dev/aiagentapi/YOUR_ARTIFACT_REGISTRY_REPO/YOUR_SERVICE_NAME:$COMMIT_SHA'
      - '.'
    dir: 'frontend' # Assuming this cloudbuild.yaml is in the root of your repo, and Dockerfile is in frontend/

  # 2. Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'YOUR_REGION-docker.pkg.dev/aiagentapi/YOUR_ARTIFACT_REGISTRY_REPO/YOUR_SERVICE_NAME:$COMMIT_SHA'
    dir: 'frontend'

  # 3. Deploy the image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'YOUR_SERVICE_NAME' # e.g., wealthaiagent-frontend
      - '--image'
      - 'YOUR_REGION-docker.pkg.dev/aiagentapi/YOUR_ARTIFACT_REGISTRY_REPO/YOUR_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - 'YOUR_REGION' # e.g., us-central1
      - '--project'
      - 'aiagentapi'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated' # Allow public access
      # Add any other necessary flags, like environment variables, memory, CPU, etc.
      # Example for setting a runtime environment variable if needed:
      # - '--set-env-vars=EXAMPLE_VARIABLE=example_value'

images:
  - 'YOUR_REGION-docker.pkg.dev/aiagentapi/YOUR_ARTIFACT_REGISTRY_REPO/YOUR_SERVICE_NAME:$COMMIT_SHA'

# Recommended: Use substitutions for clarity and easy changes
substitutions:
  _REGION: 'us-central1' # <-- CHANGE THIS TO YOUR PREFERRED REGION
  _ARTIFACT_REPO: 'frontend-docker-repo' # <-- CHANGE THIS TO YOUR ARTIFACT REGISTRY REPO NAME
  _SERVICE_NAME: 'wealthaiagent-frontend' # <-- CHANGE THIS TO YOUR CLOUD RUN SERVICE NAME
  # _GCP_PROJECT_ID: 'aiagentapi' # Already known

# If you use substitutions, your args would look like:
# - 'build'
# - '-t'
# - '${_REGION}-docker.pkg.dev/${_GCP_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
# etc.
# And for deploy:
# - 'run'
# - 'deploy'
# - '${_SERVICE_NAME}'
# - '--image'
# - '${_REGION}-docker.pkg.dev/${_GCP_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
# - '--region'
# - '${_REGION}'
# - '--project'
# - '${_GCP_PROJECT_ID}'