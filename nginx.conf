# frontend/nginx.conf

server {
    listen 80;
    server_name localhost; # This will be ignored in Cloud Run but is good practice

    # Serve static files for the /chataiagent path
    location /chataiagent/ {
        root /usr/share/nginx/html; # Nginx root
        try_files $uri $uri/ /chataiagent/index.html; # Handle SPA routing
    }

    # Optional: Redirect from / to /chataiagent/ if someone hits the root
    location = / {
        return 301 /chataiagent/;
    }

    # Optional: Health check endpoint for Cloud Run (if needed)
    location /_healthz {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Other configurations like gzip, cache control can be added here
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}