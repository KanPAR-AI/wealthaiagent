# frontend/nginx.conf

server {
    listen 80;
    server_name localhost; # This will be ignored by Cloud Run

    # General logging (optional, Cloud Run handles logging too)
    # access_log /var/log/nginx/access.log;
    # error_log /var/log/nginx/error.log;

    # Define the root for /chataiagent/ requests.
    # Since the Dockerfile copies files to /usr/share/nginx/html/chataiagent,
    # and assets inside index.html are like "/chataiagent/assets/...",
    # Nginx needs to correctly map these.
    location /chataiagent/ {
        alias /usr/share/nginx/html/chataiagent/; # Alias ensures that /chataiagent/ maps to this directory
        try_files $uri $uri/ /chataiagent/index.html; # Handles SPA routing

        # Add caching headers for static assets if desired
        # location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|woff|woff2|ttf|eot|svg)$ {
        #     expires 1y;
        #     add_header Cache-Control "public";
        # }
    }

    # Optional: If users might try to access the service root URL without /chataiagent/
    # you can redirect them.
    location = / {
        return 301 /chataiagent/;
    }

    # Health check endpoint (Cloud Run can use this)
    location = /_healthz {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}