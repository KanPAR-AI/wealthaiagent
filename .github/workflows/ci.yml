name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Clean npm cache and install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install
      
    - name: Run linting
      run: npm run lint
      
    - name: Run unit tests
      run: npm run test:ci -- --coverage
      
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        
    - name: Comment test results on PR
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
          const total = coverage.total;
          
          const comment = `## Test Coverage Report 📊
          
          | Metric | Coverage |
          |--------|----------|
          | Statements | ${total.statements.pct}% |
          | Branches | ${total.branches.pct}% |
          | Functions | ${total.functions.pct}% |
          | Lines | ${total.lines.pct}% |
          
          ✅ All tests passed!`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Clean npm cache and install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install
      
    - name: Build application
      run: npm run build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/

  # NOTE: prod prod-builds are submitted to Google Cloud Build
  # (`gcloud builds submit --config cloudbuild.yaml`) and pushed to
  # Artifact Registry at us-central1-docker.pkg.dev/aiagentapi/
  # yourfinadvisor-repo/wealthaiagent-frontend. Docker Hub isn't in
  # the path. The old `docker` job that lived here logged in with
  # `DOCKER_USERNAME` / `DOCKER_PASSWORD` secrets that were never set
  # — every push has been red-X'd since at least May 2026. Removed.
  # If you want push-to-main to auto-deploy, hook up a Cloud Build
  # GitHub trigger (one-time console setup) or add a GH Action that
  # auths to GCP via WIF + runs `gcloud builds submit`.